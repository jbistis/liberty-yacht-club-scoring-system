<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
// Force iOS to not zoom on rotation
function resetViewport() {
  const mv = document.querySelector('meta[name=viewport]');
  mv.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
}
window.addEventListener('orientationchange', function() {
  setTimeout(resetViewport, 50);
  setTimeout(resetViewport, 300);
});
window.addEventListener('resize', resetViewport);
</script>
<title>Race Results</title>
<style>
  :root {
    --navy: #1c3f6e;
    --blue: #2e6db4;
    --blue-light: #4a86e8;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #e0e0e0;
    --bg: #ffffff;
    --bg-alt: #f7f9fc;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    height: 100%;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  #page { display: flex; flex-direction: column; height: 100vh; }

  /* ── ROTATE HINT ── */
  #rotate-hint {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    padding: 20px 24px;
    background: var(--bg);
  }
  #rotate-hint .icon { font-size: 40px; margin-bottom: 12px; display: block; animation: wiggle 2s ease-in-out infinite; }
  #rotate-hint .title { font-size: 16px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  #rotate-hint .subtitle { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
  @keyframes wiggle { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-20deg)} 75%{transform:rotate(20deg)} }

  /* ── PORTRAIT LOCK ── */
  body.is-portrait #top-bar,
  body.is-portrait #controls,
  body.is-portrait #scroll-area-wrap,
  body.is-portrait #scroll-hint { display:none !important; }
  body.is-portrait #rotate-hint { display:flex !important; }
  td:first-child, th:first-child { position:sticky; left:0; z-index:3; background:inherit; touch-action:pan-x pan-y pinch-zoom; }
  thead th:first-child { background:var(--bg-alt); z-index:4; }

  /* ── SEASON BAR ── */
  #season-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px 6px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  #season-bar label { font-weight: 700; font-size: 12px; color: var(--navy); white-space: nowrap; letter-spacing: 0.03em; text-transform: uppercase; }
  #season-picker { display: flex; gap: 5px; flex-wrap: wrap; }
  .season-btn {
    padding: 4px 12px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--bg);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    white-space: nowrap;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .season-btn:hover { background: var(--bg-alt); border-color: var(--blue); }
  .season-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  /* ── SEASON SUBTITLE ── */
  #season-subtitle {
    flex-shrink: 0;
    padding: 5px 10px 4px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  #season-subtitle span { color: var(--navy); font-weight: 700; }

  /* ── TOP BAR ── */
  #top-bar { flex-shrink:0; background:var(--bg); border-bottom:2px solid var(--navy); padding:8px 10px 0; }

  /* ── TABS ── */
  #tabs { display:flex; overflow-x:auto; gap:5px; padding-bottom:8px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  #tabs::-webkit-scrollbar { display:none; }
  .tab-btn { flex-shrink:0; padding:5px 12px; border:1.5px solid var(--border); border-radius:20px; background:var(--bg); font-size:12px; font-weight:500; cursor:pointer; color:var(--text-muted); white-space:nowrap; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
  .tab-btn:active { opacity:0.7; }
  .tab-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }

  /* ── CONTROLS ── */
  #controls { flex-shrink:0; display:flex; gap:6px; padding:6px 10px; align-items:center; background:var(--bg); border-bottom:1px solid var(--border); }
  #search { flex:1; padding:7px 10px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; outline:none; background:var(--bg-alt); min-width:0; }
  #search:focus { border-color:var(--blue); background:#fff; }
  #col-filter { padding:7px 6px; border:1.5px solid var(--border); border-radius:8px; font-size:12px; background:var(--bg-alt); outline:none; cursor:pointer; max-width:90px; }
  #count { font-size:11px; color:var(--text-muted); white-space:nowrap; flex-shrink:0; }

  /* ── COMPACT MODE (all phones) ── */
  @media screen and (max-width: 768px) {
    html, body { font-size: 3.5px; }
    .tab-btn   { padding:1px 3px; font-size:3.5px; border-radius:6px; }
    #top-bar   { padding:1px 3px 0; }
    #tabs      { gap:2px; padding-bottom:2px; }
    #controls  { padding:1px 3px; gap:2px; }
    #search    { padding:1px 3px; font-size:3.5px; border-radius:3px; }
    #col-filter{ padding:1px 2px; font-size:3.5px; max-width:35px; border-radius:3px; }
    #count     { font-size:3.5px; }
    th         { padding:1px 3px !important; font-size:3.5px !important; }
    td         { padding:1px 3px !important; font-size:3.5px !important; }
    td.num     { text-align:right !important; }
    #scroll-hint { display:none !important; }
    #season-bar { padding:1px 3px; gap:2px; }
    #season-bar label { font-size:3.5px; }
    .season-btn { padding:1px 3px; font-size:3.5px; }
    #season-subtitle { padding:1px 3px; font-size:3.5px; }
  }

  /* ── SCROLL HINT ── */
  #scroll-hint { display:none; align-items:center; justify-content:center; padding:4px 10px; font-size:11px; color:var(--text-muted); background:#f0f4ff; border-bottom:1px solid #d0dcf5; animation:fadeout 4s forwards; animation-delay:2s; }
  #scroll-hint.visible { display:flex; }
  @keyframes fadeout { 0%{opacity:1} 100%{opacity:0;pointer-events:none} }

  /* ── SCROLL AREA ── */
  #scroll-area-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
  #scroll-area-wrap::after { content:''; position:absolute; top:0; right:0; bottom:0; width:28px; background:linear-gradient(to right,transparent,rgba(255,255,255,0.85)); pointer-events:none; z-index:5; transition:opacity 0.3s; }
  #scroll-area-wrap.scrolled-right::after { opacity:0; }
  #scroll-area-wrap.no-fade::after { opacity:0; }
  #scroll-area { flex:1; overflow-y:auto; overflow-x:auto; -webkit-overflow-scrolling:touch; touch-action:pan-x pan-y pinch-zoom; }

  table { width:max-content; min-width:100%; border-collapse:collapse; touch-action:pan-x pan-y pinch-zoom; }
  table.compact-table { min-width:0; width:auto; }
  thead tr { background:var(--bg-alt); }
  th { position:sticky; top:0; z-index:2; padding:8px 10px; text-align:left; font-weight:700; font-size:10px; color:var(--navy); white-space:nowrap; cursor:pointer; user-select:none; border-bottom:2px solid var(--border); letter-spacing:0.04em; text-transform:uppercase; background:var(--bg-alt); }
  th:hover { background:#eef2f8; }
  th.sort-asc  .sort-icon::after { content:' ▲'; color:var(--blue); font-size:9px; }
  th.sort-desc .sort-icon::after { content:' ▼'; color:var(--blue); font-size:9px; }
  th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content:' ⇅'; color:#bbb; font-size:9px; }
  tbody tr { border-bottom:1px solid #f0f0f0; }
  tbody tr:last-child { border-bottom:none; }
  @media (hover:hover) { tbody tr:hover { background:var(--bg-alt); } }
  tbody tr:active { background:#e8f0fc; }
  td { padding:7px 10px; font-size:12px; color:var(--text); vertical-align:middle; white-space:nowrap; }
  td.num { text-align:right; }
  .row-col-header td:not(:first-child) { text-align:right; }
  tr.shade-0 td { background:#f0f4f8; }
  tr.shade-1 td { background:#f2f8f5; }
  tr.shade-2 td { background:#fdfaf5; }
  tr.shade-0 td.status-flag, tr.shade-1 td.status-flag, tr.shade-2 td.status-flag { color:#888; font-style:italic; }
  .row-section   td { background:var(--navy) !important; color:#fff !important; font-weight:700; font-size:12px; padding:8px 10px; }
  .row-subheader td { background:var(--blue) !important; color:#fff !important; font-weight:600; padding:7px 10px; }
  .row-col-header td { background:var(--blue-light) !important; color:#fff !important; font-weight:600; font-size:10px; padding:7px 10px; text-transform:uppercase; letter-spacing:0.04em; }
  .row-col-header td.num-header { text-align:right; }

  #loading { text-align:center; padding:32px 16px; color:var(--text-muted); font-size:13px; }
  .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 10px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  #empty { text-align:center; padding:32px 16px; color:var(--text-muted); font-size:13px; display:none; }
  #error { margin:10px; background:#fff5f5; border:1px solid #fcc; border-radius:var(--radius); padding:12px; color:#c00; font-size:12px; display:none; }
</style>
</head>
<body>
<div id="page">

  <div id="rotate-hint">
    <span class="icon">📱</span>
    <div class="title">Rotate your phone</div>
    <div class="subtitle">This table is best viewed<br>in landscape mode</div>
  </div>

  <!-- ── SEASON PICKER ── -->
  <div id="season-bar">
    <label>Season:</label>
    <div id="season-picker"></div>
  </div>
  <div id="season-subtitle"></div>

  <div id="top-bar"><div id="tabs"></div></div>

  <div id="controls">
    <input type="text" id="search" placeholder="Search…" />
    <select id="col-filter"><option value="">All columns</option></select>
    <span id="count"></span>
  </div>

  <div id="scroll-hint">← Swipe left/right to see all columns →</div>

  <div id="scroll-area-wrap">
    <div id="scroll-area">
      <div id="loading"><div class="spinner"></div>Loading data…</div>
      <div id="error"></div>
      <div id="app" style="display:none;">
        <table id="table">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="empty">No matching rows found.</div>
      </div>
    </div>
  </div>

</div>
<script>
// ─────────────────────────────────────────────
// SEASON CONFIGURATION
// To add a new season: add one line to SEASONS
// with the year and its deployed Apps Script URL.
// Update DEFAULT_YEAR each new season.
// ─────────────────────────────────────────────
const SEASONS = {
  2026: 'https://script.google.com/macros/s/AKfycbxXvjtF9Jal0zIMeLiuF1kmLhnqIw9zl-F21k0KuoNKeo0Bkw2keLBwiWDttLhXfUl6Tw/exec',
  2025: 'https://script.google.com/macros/s/AKfycbzgTQEgjgHDNK3UAcfLaYoNdCmspk67wukXsP-1x2pU73OfIq4BE-oeyvc02ZCWrhmuLg/exec',
  // 2025: 'https://script.google.com/macros/s/AKfycbwzcpvWhLDsgc0ktq457rFmucTblt4Dh_RotzSDm3dyKw_qzEdqDuev3lDx93bOUl-QZg/exec',
  // 2024: 'https://script.google.com/macros/s/PASTE_2024_SCRIPT_URL_HERE/exec',
  // 2023: 'https://script.google.com/macros/s/PASTE_2023_SCRIPT_URL_HERE/exec',
};
const DEFAULT_YEAR = 2026; // ← update this each new season
// ─────────────────────────────────────────────

const TABS = ['Calculated Results','Series Standings','Season Standings','Cumulative Results','Scratch Sheet'];
const TAB_LABELS = {'Calculated Results':'Results'};
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SPECIAL = ['Cumulative Results','Series Standings','Season Standings'];

let allRows = [], headers = [], displayHeaders = [], colOrder = [], sortCol = -1, sortDir = 1, activeTab = 'Scratch Sheet';
let activeSeason = DEFAULT_YEAR;
let PROXY_URL = SEASONS[DEFAULT_YEAR];

function getMode() {
  const sw = screen.width, sh = screen.height;
  const isPhone = Math.min(sw, sh) < 500;
  if (!isPhone) return 'desktop';
  const isPortrait = screen.orientation
    ? screen.orientation.type.includes('portrait')
    : (sw < sh);
  return isPortrait ? 'portrait' : 'landscape';
}

function applyMode() {
  const mode = getMode();
  document.body.classList.toggle('is-portrait', mode === 'portrait');
}

applyMode();
if (screen.orientation) {
  screen.orientation.addEventListener('change', () => setTimeout(applyMode, 150));
} else {
  window.addEventListener('orientationchange', () => setTimeout(applyMode, 300));
}
window.addEventListener('resize', () => setTimeout(applyMode, 150));

window.addEventListener('load', () => {
  const sa = document.getElementById('scroll-area');
  const wrap = document.getElementById('scroll-area-wrap');
  if (sa) sa.addEventListener('scroll', () => {
    wrap.classList.toggle('scrolled-right', sa.scrollLeft + sa.clientWidth >= sa.scrollWidth - 4);
  });
});

function secondsToHMS(secs) {
  const s=Math.round(secs), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function formatValue(val) {
  if (!val) return '';
  const s = String(val);
  if (/^\d{1,2}:\d{2}(:\d{2})?(\s*(AM|PM))?$/i.test(s.trim())) return val;
  if (/^\d+(\.\d+)?%$/.test(s.trim())) return parseFloat(s).toFixed(1) + '%';
  if (/^\d+(\.\d+)?$/.test(s.trim())) return val;
  if (/^\d{1,3}\/\d{1,3}$/.test(s.trim())) return val;
  if (/^\d+ of \d+$/.test(s.trim())) return val;
  const d = new Date(val);
  if (isNaN(d.getTime())||s.length<=6||!/\d{4}/.test(s)) return val;
  const yr=d.getFullYear(), day=String(d.getDate()).padStart(2,'0'), mon=MONTHS[d.getMonth()];
  const hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0'), ss=String(d.getSeconds()).padStart(2,'0');
  const hasTime=d.getHours()||d.getMinutes()||d.getSeconds();
  if (yr<=1900) return hh+':'+mm+':'+ss;
  const yrS=String(yr).slice(-2);
  return hasTime ? day+'-'+mon+' @ '+hh+':'+mm : day+'-'+mon+'-'+yrS;
}

function parseCSV(text) {
  const rows=[];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const row=[]; let cell='',inQ=false;
    for (let i=0;i<line.length;i++) {
      const c=line[i];
      if (c==='"'){if(inQ&&line[i+1]==='"'){cell+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){row.push(cell.trim());cell='';}
      else cell+=c;
    }
    row.push(cell.trim()); rows.push(row);
  }
  return rows;
}

function renderSpecial(type) {
  const tbody=document.getElementById('tbody');
  document.getElementById('thead').innerHTML='';
  tbody.innerHTML='';
  document.getElementById('empty').style.display='none';
  document.getElementById('controls').style.display='none';
  document.getElementById('scroll-hint').classList.remove('visible');
  document.getElementById('scroll-area-wrap').classList.add('no-fade');
  document.getElementById('table').classList.add('compact-table');

  for (const row of allRows) {
    const first=String(row[0]||'');
    const tr=document.createElement('tr');
    const isSection=
      (type==='cumulative'&&first.startsWith('SERIES'))||
      (type==='series'&&((first.startsWith('CLASS')&&first.includes('SERIES'))||(first.startsWith('SERIES')&&first.includes('CLASS'))))||
      (type==='season'&&first.startsWith('CLASS')&&first.includes('SEASON'));

    if (isSection) {
      tr.classList.add('row-section');
      const td=document.createElement('td'); td.colSpan=20; td.textContent=first; tr.appendChild(td);
    } else if (type==='cumulative'&&first.startsWith('Class')) {
      tr.classList.add('row-subheader');
      const td=document.createElement('td'); td.colSpan=20; td.textContent=first; tr.appendChild(td);
    } else if (first==='Boat Name') {
      tr.classList.add('row-col-header');
      row.forEach((cell, idx)=>{
        if(cell!==''||type==='cumulative'){
          const td=document.createElement('td');
          td.textContent=cell||'';
          if (idx > 0) td.style.textAlign='right';
          tr.appendChild(td);
        }
      });
    } else if (first!=='') {
      row.forEach((cell, idx)=>{
        const raw=String(cell||'');
        const isFrac=/^\d{1,3}\/\d{1,3}$/.test(raw.trim())||/^\d+ of \d+$/.test(raw.trim());
        const display=isFrac?raw:(type==='cumulative'?raw:formatValue(raw));
        const td=document.createElement('td'); td.textContent=display;
        if (type==='cumulative' && idx > 0) {
          td.classList.add('num');
        } else if (/^\d+(\.\d+)?%?$/.test(raw.trim()) || /^-?\d+(\.\d+)?$/.test(display.trim())) {
          td.classList.add('num');
        }
        tr.appendChild(td);
      });
    } else { continue; }
    tbody.appendChild(tr);
  }
  document.getElementById('count').textContent='';
}

function render() {
  if (activeTab==='Cumulative Results'){renderSpecial('cumulative');return;}
  if (activeTab==='Series Standings')  {renderSpecial('series');return;}
  if (activeTab==='Season Standings')  {renderSpecial('season');return;}

  const query=document.getElementById('search').value.toLowerCase().trim();
  const filterCol=document.getElementById('col-filter').value;
  let rows=allRows.filter(row=>{
    if (!query) return true;
    if (filterCol!=='') {
      const val=String(row[parseInt(filterCol)]||'').trim();
      const valLower=val.toLowerCase();
      const isNumericQuery=/^\d+$/.test(query);
      const isNumericVal=/^\d+$/.test(val);
      if (isNumericQuery && isNumericVal) return val === query;
      return valLower.includes(query);
    }
    return row.some(c=>(c||'').toString().toLowerCase().includes(query));
  });

  if (sortCol>=0) {
    rows=[...rows].sort((a,b)=>{
      const va=a[sortCol]||'',vb=b[sortCol]||'';
      const na=parseFloat(va),nb=parseFloat(vb);
      if (!isNaN(na)&&!isNaN(nb)) return (na-nb)*sortDir;
      return va.localeCompare(vb)*sortDir;
    });
  }

  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  const empty=document.getElementById('empty');

  if (!rows.length) {
    empty.style.display='block';
    document.getElementById('scroll-hint').classList.remove('visible');
  } else {
    empty.style.display='none';
    const raceTypeIdx=headers.findIndex(h=>h.toLowerCase().includes('racetype'));
    const raceIdx=headers.findIndex(h=>h.toUpperCase()==='RACE#');
    const classIdx=headers.findIndex(h=>h.toUpperCase()==='CLASS' || h.toLowerCase()==='class');
    let lastRace=null, lastClass=null, shadeIdx=0;
    for (const row of rows) {
      const tr=document.createElement('tr');
      if (raceTypeIdx>=0&&String(row[raceTypeIdx]||'').startsWith('Practice')) tr.classList.add('practice-row');
      const currentRace=raceIdx>=0?String(row[raceIdx]||'').trim():'';
      const currentClass=classIdx>=0?String(row[classIdx]||'').trim():'';
      if (currentRace && currentRace!==lastRace && lastRace!==null) {
        shadeIdx = (shadeIdx + 1) % 3;
      } else if (currentClass && currentClass!==lastClass && lastClass!==null) {
        shadeIdx = (shadeIdx + 1) % 3;
      }
      lastRace=currentRace; lastClass=currentClass;
      tr.classList.add('shade-' + shadeIdx);
      for (const i of colOrder) {
        const td=document.createElement('td');
        const raw=row[i]||'';
        const isTime=(headers[i]||'').toLowerCase().match(/elapsed|corrected/);
        let display=formatValue(raw);
        if (isTime&&/^\d+$/.test(String(raw).trim())&&parseInt(raw)>60) display=secondsToHMS(parseInt(raw));
        td.textContent=display; td.title=raw;
        if (/^\d+(\.\d+)?%?$/.test(String(raw).trim()) || /^-?\d+(\.\d+)?$/.test(String(display).trim())) td.classList.add('num');
        const isStatusCol=(headers[i]||'').toUpperCase()==='STATUS';
        if (isStatusCol && /^(DNC|RET|DNF|TLE|DSQ|DNE|OCS)$/i.test(String(raw).trim())) td.classList.add('status-flag');
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    setTimeout(()=>{
      const sa=document.getElementById('scroll-area');
      if (sa&&sa.scrollWidth>sa.clientWidth+10)
        document.getElementById('scroll-hint').classList.add('visible');
    },150);
  }

  const total=allRows.length,shown=rows.length;
  document.getElementById('count').textContent=shown===total
    ?total+' row'+(total!==1?'s':'')
    :shown+' of '+total;
}

function buildHeaders() {
  const thead=document.getElementById('thead');
  thead.innerHTML='';
  const sel=document.getElementById('col-filter');
  sel.innerHTML='<option value="">All columns</option>';
  const tr=document.createElement('tr');
  sortCol=-1; sortDir=1;
  colOrder.forEach((origIdx)=>{
    const h=displayHeaders[origIdx];
    const th=document.createElement('th');
    th.innerHTML=h+'<span class="sort-icon"></span>';
    th.addEventListener('click',()=>{
      if(sortCol===origIdx)sortDir*=-1;else{sortCol=origIdx;sortDir=1;}
      document.querySelectorAll('th').forEach(el=>el.classList.remove('sort-asc','sort-desc'));
      th.classList.add(sortDir===1?'sort-asc':'sort-desc');
      render();
    });
    tr.appendChild(th);
    const opt=document.createElement('option');opt.value=origIdx;opt.textContent=h;sel.appendChild(opt);
  });
  thead.appendChild(tr);
}

function buildTabs() {
  const container=document.getElementById('tabs');
  container.innerHTML='';
  TABS.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(name===activeTab?' active':'');
    btn.textContent=TAB_LABELS[name]||name;
    btn.addEventListener('click',()=>{
      if(name===activeTab)return;
      activeTab=name;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
      loadTab(name);
    });
    container.appendChild(btn);
  });
}

async function loadTab(tabName) {
  document.getElementById('search').value='';
  document.getElementById('controls').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loading').style.display='block';
  document.getElementById('error').style.display='none';
  document.getElementById('scroll-area').scrollTop=0;
  document.getElementById('scroll-area').scrollLeft=0;
  document.getElementById('scroll-hint').classList.remove('visible');
  document.getElementById('scroll-area-wrap').classList.remove('no-fade');
  document.getElementById('table').classList.remove('compact-table');

  try {
    const res=await fetch(PROXY_URL+'?sheet='+encodeURIComponent(tabName));
    if (!res.ok) throw new Error('HTTP '+res.status);
    const rows=parseCSV(await res.text());
    if (!rows.length) throw new Error('Tab appears empty.');
    if (SPECIAL.includes(tabName)) {
      headers=[]; allRows=rows.filter(r=>r.some(c=>c));
    } else {
      headers=rows[0]; allRows=rows.slice(1).filter(r=>r.some(c=>c));
    }
    displayHeaders = headers.map(h => h === 'Race#' ? 'Race' : h);
    colOrder = headers.map((_,i) => i);
    if (tabName === 'Calculated Results') {
      displayHeaders = headers.map(h => h === 'Race#' ? 'Race' : h);
      const preferred = ['Race#','Class','Place','Boat Name','Elapsed','Corrected','Status','Points','Start DateTime','Finish DateTime','Course','Series'];
      const prefixIndices = preferred.map(p => headers.findIndex(h => h === p)).filter(i => i >= 0);
      const restIndices = headers.map((_,i) => i).filter(i => !prefixIndices.includes(i));
      colOrder = [...prefixIndices, ...restIndices];
    }
    if (tabName === 'Race Results Entry') {
      const hidden = ['startdate','starttime','finish date','finishtime','sunset time','after sunset (min)'];
      const preferred = ['Race#','Series','RaceType','Course','BoatName','Class','StartDateTime','FinishDateTime','Status','Wind','Tide'];
      const prefixIndices = preferred.map(p => headers.findIndex(h => h.toLowerCase() === p.toLowerCase())).filter(i => i >= 0);
      const restIndices = headers.map((_,i) => i).filter(i => !prefixIndices.includes(i) && !hidden.includes((headers[i]||'').toLowerCase()));
      colOrder = [...prefixIndices, ...restIndices];
    }
    const bowPos = colOrder.findIndex(i => /bow/i.test(headers[i]||''));
    const classPos = colOrder.findIndex(i => String(headers[i]||'').toLowerCase() === 'class');
    if (bowPos >= 0 && classPos >= 0) {
      const [bowIdx] = colOrder.splice(bowPos, 1);
      const newClassPos = colOrder.findIndex(i => String(headers[i]||'').toLowerCase() === 'class');
      colOrder.splice(newClassPos + 1, 0, bowIdx);
    }
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    buildHeaders();
    if (tabName === 'Calculated Results') {
      const raceIdx  = headers.findIndex(h => h.toUpperCase() === 'RACE#');
      const classIdx = headers.findIndex(h => h.toUpperCase() === 'CLASS');
      const placeIdx = headers.findIndex(h => h.toUpperCase() === 'PLACE');
      if (raceIdx >= 0) {
        allRows.sort((a, b) => {
          const ra = parseFloat(a[raceIdx]||0), rb = parseFloat(b[raceIdx]||0);
          if (ra !== rb) return rb - ra;
          const ca = String(a[classIdx]||''), cb = String(b[classIdx]||'');
          if (ca !== cb) return ca.localeCompare(cb);
          const paRaw = a[placeIdx], pbRaw = b[placeIdx];
          const pa = (paRaw === '' || paRaw === null || paRaw === undefined) ? 9999 : parseFloat(paRaw);
          const pb = (pbRaw === '' || pbRaw === null || pbRaw === undefined) ? 9999 : parseFloat(pbRaw);
          return pa - pb;
        });
        sortCol = raceIdx; sortDir = -1;
        const ths = document.querySelectorAll('th');
        const displayPos = colOrder.indexOf(raceIdx);
        if (ths[displayPos] >= 0) ths[displayPos].classList.add('sort-desc');
      }
    }
    if (tabName === 'Race Results Entry') {
      const raceIdx  = headers.findIndex(h => h.toUpperCase() === 'RACE#');
      const classIdx = headers.findIndex(h => h.toUpperCase() === 'CLASS');
      const boatIdx  = headers.findIndex(h => h.toUpperCase() === 'BOATNAME');
      if (raceIdx >= 0) {
        allRows.sort((a, b) => {
          const ra = parseFloat(a[raceIdx]||0), rb = parseFloat(b[raceIdx]||0);
          if (ra !== rb) return rb - ra;
          const ca = String(a[classIdx]||''), cb = String(b[classIdx]||'');
          if (ca !== cb) return ca.localeCompare(cb);
          const ba = String(a[boatIdx]||''), bb = String(b[boatIdx]||'');
          return ba.localeCompare(bb);
        });
        sortCol = raceIdx; sortDir = -1;
        const ths2 = document.querySelectorAll('th');
        const displayPos2 = colOrder.indexOf(raceIdx);
        if (ths2[displayPos2] >= 0) ths2[displayPos2].classList.add('sort-desc');
      }
    }
    render(); applyMode();
  } catch(e) {
    document.getElementById('loading').style.display='none';
    const err=document.getElementById('error');
    err.style.display='block';
    err.textContent='Could not load "'+tabName+'" for '+activeSeason+': '+e.message;
  }
}

function updateSubtitle() {
  document.getElementById('season-subtitle').innerHTML =
    '<span>' + activeSeason + '</span> Wednesday Night Racing';
}

function buildSeasonPicker() {
  const container = document.getElementById('season-picker');
  container.innerHTML = '';
  const years = Object.keys(SEASONS).map(Number).sort((a, b) => b - a);
  years.forEach(function(year) {
    const btn = document.createElement('button');
    btn.className = 'season-btn' + (year === activeSeason ? ' active' : '');
    btn.textContent = year;
    btn.addEventListener('click', function() {
      if (year === activeSeason) return;
      activeSeason = year;
      PROXY_URL = SEASONS[year];
      activeTab = 'Scratch Sheet';
      document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateSubtitle();
      buildTabs();
      loadTab(activeTab);
    });
    container.appendChild(btn);
  });
}

// Init
buildSeasonPicker();
updateSubtitle();
buildTabs();
loadTab(activeTab);
applyMode();

document.getElementById('search').addEventListener('input', render);
document.getElementById('col-filter').addEventListener('change', render);
</script>
